<html>
  <head>
    <title>Tool Inspector</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h2 class="collapsible-header">WebMCP Tools</h2>
      <div class="section-content">

      <div id="status"></div>

      <div class="table-container">
        <table id="resultsTable">
          <thead>
            <tr id="tableHeaderRow"></tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
        <div id="copyToClipboard">
          <span id="copyAsScriptToolConfig">📝 Copy as ScriptToolConfig</span>
          <span id="copyAsJSON">📝 Copy as JSON</span>
        </div>
      </div>
      </div>

      <h2 class="collapsible-header">Interact with the Page</h2>
      <div class="section-content">

      <div class="form-group">
        <label for="userPromptText">User Prompt</label>
        <textarea id="userPromptText"></textarea>
      </div>

      <dialog id="globalToolsSection" popover autofocus>
        <div class="menu-label">Global tools</div>
        <div id="globalToolsList"></div>
      </dialog>

      <dialog id="advancedSection" popover autofocus>
        <div class="menu-label">Provider</div>
        <label class="model-option">
          <input type="radio" name="provider" value="gemini">
          <span>Gemini</span>
        </label>
        <label class="model-option">
          <input type="radio" name="provider" value="ark" checked>
          <span>ARK (Doubao)</span>
        </label>

        <div id="geminiGroup">
          <div class="menu-label">Gemini Model</div>
          <label class="model-option">
            <input type="radio" name="geminiModel" value="gemini-3-flash-preview" checked>
            <span>Gemini 3 Flash Preview</span>
          </label>
          <label class="model-option">
            <input type="radio" name="geminiModel" value="gemini-3.1-flash-lite">
            <span>Gemini 3.1 Flash-Lite</span>
          </label>
          <label class="model-option">
            <input type="radio" name="geminiModel" value="gemini-3.5-flash">
            <span>Gemini 3.5 Flash</span>
          </label>
        </div>

        <div id="arkGroup">
          <div class="menu-label">ARK Model</div>
          <label class="model-option">
            <input type="radio" name="arkModel" value="doubao-seed-2-0-pro-260215" checked>
            <span>Doubao Seed 2.0 Pro</span>
          </label>
          <label class="model-option">
            <input type="radio" name="arkModel" value="doubao-seed-2-0-lite-260428">
            <span>Doubao Seed 2.0 Lite</span>
          </label>
          <label class="model-option">
            <input type="radio" name="arkModel" value="doubao-seed-2-0-mini">
            <span>Doubao Seed 2.0 Mini</span>
          </label>
          <label class="model-option">
            <input type="radio" name="arkModel" value="doubao-seed-2-0-code">
            <span>Doubao Seed 2.0 Code</span>
          </label>
          <label class="model-option">
            <input type="radio" name="arkModel" value="doubao-seed-1-8">
            <span>Doubao Seed 1.8</span>
          </label>
          <label class="model-option">
            <input type="radio" name="arkModel" value="doubao-seed-1-6">
            <span>Doubao Seed 1.6</span>
          </label>
          <label class="model-option">
            <input type="radio" name="arkModel" value="doubao-seed-1-6-flash">
            <span>Doubao Seed 1.6 Flash (no thinking)</span>
          </label>
          <label class="model-option">
            <input type="radio" name="arkModel" value="doubao-seed-1-6-vision">
            <span>Doubao Seed 1.6 Vision (no thinking)</span>
          </label>

          <div class="menu-label">Thinking</div>
          <label class="model-option">
            <input type="radio" name="arkThinking" value="disabled" checked>
            <span>Off (faster)</span>
          </label>
          <label class="model-option">
            <input type="radio" name="arkThinking" value="enabled">
            <span>On</span>
          </label>
          <label class="model-option">
            <input type="radio" name="arkThinking" value="auto">
            <span>Auto</span>
          </label>
        </div>

        <div class="menu-label">API Key</div>
        <input type="password" id="apiKeyInput" placeholder="API key">
      </dialog>

      <div class="form-group">
        <button id="promptBtn" disabled>Send</button>
        <button id="suggestBtn" class="secondary" disabled>Suggest</button>
        <button id="resetBtn" class="secondary" disabled>Reset</button>
        <button id="configBtn" class="secondary" popovertarget="advancedSection">Config</button>
        <button id="toolsBtn" class="secondary" popovertarget="globalToolsSection">Tools</button>
        <button id="traceBtn" class="secondary">Copy trace</button>
      </div>

      <div id="promptResults"></div>

      <div class="form-group">
        <label for="toolNames">Tool</label>
        <select id="toolNames"></select>
      </div>

      <div class="form-group">
        <label for="inputArgsText">Input Arguments</label>
        <textarea id="inputArgsText">{"text": "hello world"}</textarea>
      </div>

      <div class="form-group">
        <button id="executeBtn">Execute Tool</button>
      </div>

      <pre id="toolResults"></pre>
      </div>
    </div>
    <script type="module" src="sidebar.js"></script>
  </body>
</html>
