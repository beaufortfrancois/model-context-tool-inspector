<html>
<head>
  <title>Microphone Permission</title>
  <style>
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      height: 100vh; 
      margin: 0; 
      text-align: center;
      background: #f3f4f6;
      color: #1f2937;
    }
    .card {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      max-width: 300px;
      width: 90%;
    }
    h1 { font-size: 18px; margin-top: 0; margin-bottom: 12px; }
    p { font-size: 13px; color: #4b5563; margin-bottom: 20px; line-height: 1.4; }
    button {
      width: 100%;
      padding: 10px;
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
    }
    button:hover { background-color: #1d4ed8; }
    #status { margin-top: 15px; font-size: 12px; font-weight: 500; }
    .error { color: #dc2626; }
    .success { color: #059669; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Microphone Access</h1>
    <p>Click the button below to enable the microphone for Gemini Live.</p>
    <button id="askBtn">Enable Microphone</button>
    <div id="status"></div>
  </div>
  <script src="mic-permission.js"></script>
</body>
</html>
